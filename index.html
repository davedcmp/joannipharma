<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="default" />
	<title>Expiration Tracker</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<button id="menu-button" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="side-menu">
		<span aria-hidden="true"></span>
		<span aria-hidden="true"></span>
		<span aria-hidden="true"></span>
	</button>
	<button id="menu-overlay" type="button" aria-label="Close menu"></button>
	<aside id="side-menu" aria-label="Main menu">
		<nav>
			<h2>Menu</h2>
			<ul>
				<li class="has-submenu">
					<button type="button" class="submenu-toggle" aria-expanded="false" aria-controls="maintenance-submenu">Maintenance</button>
					<ul id="maintenance-submenu" class="submenu" aria-label="Maintenance submenu">
						<li><button id="inventory-menu-item" type="button">Inventory</button></li>
						<li><button id="vendor-menu-item" type="button">Vendor</button></li>
					</ul>
				</li>
			</ul>
		</nav>
	</aside>
	<main id="app" aria-label="Application root">
		<section id="main-grid-view" class="content-view" aria-label="Inventory main grid">
			<div class="main-grid-card">
				<div class="main-grid-header">
					<h2>Inventory</h2>
					<div class="main-grid-tools">
						<input id="main-grid-search" type="search" aria-label="Search inventory table" placeholder="Search SKU, description, vendor" autocomplete="off" />
						<button id="add-inventory-btn" type="button" class="add-btn" aria-label="Add new inventory item">+</button>
					</div>
				</div>
				<div class="main-grid-scroll">
					<table class="main-grid-table">
						<thead>
							<tr>
								<th scope="col"></th>
								<th scope="col">SKU#</th>
								<th scope="col">Description</th>
								<th scope="col">Quantity</th>
								<th scope="col">Return Policy</th>
								<th scope="col">Expiry Date</th>
								<th scope="col">Pull-out Date</th>
								<th scope="col">Remarks</th>
								<th scope="col">Actions</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td colspan="9" class="main-grid-empty">No records yet.</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</section>
		<section id="inventory-view" class="content-view" hidden>
			<div class="form-card">
				<div class="form-card-head">
					<h1>Inventory Details</h1>
					<button id="inventory-view-close" class="close-icon" type="button" aria-label="Close inventory form"></button>
				</div>
				<form id="inventory-form" novalidate autocomplete="off">
					<label for="inventory-sku">SKU#</label>
					<input id="inventory-sku" name="skuNumber" type="text" autocomplete="off" />

					<label for="inventory-description">Description</label>
					<input id="inventory-description" name="description" type="text" autocomplete="off" />

					<label for="inventory-vendor">Vendor</label>
					<select id="inventory-vendor" name="vendor">
						<option value="">Select a vendor</option>
					</select>

					<label for="inventory-return-policy-lead">Return Policy</label>
					<div class="policy-input-row">
						<input id="inventory-return-policy-lead" name="returnPolicyLead" type="number" inputmode="numeric" min="1" step="1" aria-label="Return policy lead time" autocomplete="off" />
						<select id="inventory-return-policy-type" name="returnPolicyType" aria-label="Return policy type">
							<option value="">Select policy</option>
							<option value="month before">Month before</option>
							<option value="month of expiry">Month of expiry</option>
						</select>
					</div>
					<button type="submit" class="primary-action">Save</button>
				</form>
				<section class="saved-inventory" aria-labelledby="saved-inventory-title">
					<div class="saved-inventory-header">
						<h2 id="saved-inventory-title">Saved Inventory</h2>
						<input id="inventory-search" type="search" aria-label="Search saved inventory" autocomplete="off" />
					</div>
					<p id="inventory-empty-state">No items saved yet.</p>
					<ul id="inventory-list"></ul>
				</section>
			</div>
		</section>
		<section id="vendor-view" class="content-view" hidden>
			<div class="form-card">
				<div class="form-card-head">
					<h1>Vendor Details</h1>
					<button id="vendor-view-close" class="close-icon" type="button" aria-label="Close vendor form"></button>
				</div>
				<form id="vendor-form" novalidate>
					<label for="vendor-name">Vendor Name</label>
					<input id="vendor-name" name="vendorName" type="text" autocomplete="off" />

					<button type="submit" class="primary-action">Save</button>
				</form>
				<section class="saved-vendors" aria-labelledby="saved-vendors-title">
					<div class="saved-vendors-header">
						<h2 id="saved-vendors-title">Saved Vendors</h2>
						<input id="vendor-search" type="search" aria-label="Search saved vendors" autocomplete="off" />
					</div>
					<p id="vendor-empty-state">No vendors saved yet.</p>
					<ul id="vendor-list"></ul>
				</section>
			</div>
		</section>
	</main>
	<section id="confirmation-modal" class="content-view" hidden>
		<div class="modal-card">
			<div class="modal-card-content">
				<p id="confirmation-message"></p>
			</div>
			<div class="modal-actions">
				<button id="confirmation-cancel" type="button" class="secondary-action">Cancel</button>
				<button id="confirmation-confirm" type="button" class="primary-action">Confirm</button>
			</div>
		</div>
	</section>
	<script src="script.js"></script>
</body>
</html>

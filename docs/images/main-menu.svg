  <text x="45" y="70" font-family="Arial, sans-serif" font-size="30" fill="#4e3535">Main Menu</text>
  <line x1="40" y1="88" x2="330" y2="88" stroke="#f0dddd"/>
  <text x="45" y="130" font-family="Arial, sans-serif" font-size="22" fill="#5a3b3b">Records</text>
  <rect x="45" y="145" width="290" height="42" rx="10" fill="#fff3f3" stroke="#f0cdcd"/>
  <text x="60" y="172" font-family="Arial, sans-serif" font-size="18" fill="#5a3b3b">Vendors</text>
  <rect x="45" y="195" width="290" height="42" rx="10" fill="#fff3f3" stroke="#f0cdcd"/>
  <text x="60" y="222" font-family="Arial, sans-serif" font-size="18" fill="#5a3b3b">Items</text>
  <text x="45" y="280" font-family="Arial, sans-serif" font-size="22" fill="#5a3b3b">Data</text>
  <rect x="45" y="295" width="290" height="42" rx="10" fill="#fff3f3" stroke="#f0cdcd"/>
  <text x="60" y="322" font-family="Arial, sans-serif" font-size="18" fill="#5a3b3b">Export CSV</text>
  <rect x="45" y="345" width="290" height="42" rx="10" fill="#fff3f3" stroke="#f0cdcd"/>

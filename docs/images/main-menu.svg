  <rect x="45" y="445" width="290" height="42" rx="10" fill="#fff3f3" stroke="#f0cdcd"/>
  <text x="60" y="472" font-family="Arial, sans-serif" font-size="18" fill="#5a3b3b">Export to Excel</text>
  <text x="410" y="90" font-family="Arial, sans-serif" font-size="26" fill="#4e3535">How to open</text>

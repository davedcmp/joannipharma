  <text x="410" y="165" font-family="Arial, sans-serif" font-size="18" fill="#6b4e4e">2. Click a section title to expand sub-menu options.</text>
  <text x="410" y="200" font-family="Arial, sans-serif" font-size="18" fill="#6b4e4e">3. Menu sections collapse when menu is closed.</text>
